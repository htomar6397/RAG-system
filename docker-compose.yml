services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ai-service:
    build: ./ai-service
    environment:
      VECTOR_BACKEND: qdrant
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_MODEL: hashing
      LLM_PROVIDER: fallback
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  backend:
    build: ./backend
    environment:
      PORT: 4000
      AI_SERVICE_URL: http://ai-service:8000
      MONGODB_URI: mongodb://mongo:27017/rag_system
      JWT_SECRET: change-me-in-production
      JWT_REFRESH_SECRET: change-me-too
    ports:
      - "4000:4000"
    depends_on:
      - ai-service
      - mongo

volumes:
  qdrant_data:
  mongo_data:
